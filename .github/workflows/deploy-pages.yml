name: Deploy public judge replay

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build verified static artifact
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: read
    steps:
      - name: Check out exact event commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify checked-out source
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Set up pinned Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.1
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install locked web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Test deployment fingerprint contract
        working-directory: apps/web
        run: npm run test:deployment

      - name: Build and verify public artifact
        working-directory: apps/web
        env:
          TAXALENS_BUILD_SHA: ${{ github.sha }}
          TAXALENS_DEPLOY_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build:deployment

      - name: Upload verified Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/web
          include-hidden-files: true

  deploy:
    name: Publish public replay
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
