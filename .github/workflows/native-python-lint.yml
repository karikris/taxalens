name: Native Python lint

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Enforce native boundary
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact event commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify checked-out source
        shell: bash
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.19
          enable-cache: true

      - name: Install locked native lint environment
        run: uv sync --locked --group dev

      - name: Check native lint and report BioMiner compatibility findings
        run: uv run --locked --group dev python scripts/verify_native_lint.py
